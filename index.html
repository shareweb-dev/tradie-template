<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradie Demo</title>
<style>
    :root {
        --primary: #ff8c00; /* Safety Orange */
        --dark: #2d2d2d;    /* Charcoal */
        --light: #f4f4f4;
    }
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        margin: 0; 
        background-color: var(--light);
        color: var(--dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }
    .card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border-top: 8px solid var(--primary);
        max-width: 400px;
        width: 90%;
    }
    h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    p { color: #666; margin-bottom: 30px; line-height: 1.6; }
    .btn { 
        background: #25D366; 
        color: white; 
        padding: 18px 30px; 
        text-decoration: none; 
        border-radius: 50px; 
        font-weight: bold;
        display: inline-block;
        transition: transform 0.2s;
        box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
    }
    .btn:hover { transform: scale(1.05); }
</style>

<div class="card">
    <h1>Tradie Name</h1>
    <p>Professional Mobile Services<br>Available across Australia</p>
    
    <p style="font-weight: bold; color: var(--dark); margin-bottom: 20px;">
        Fast. Reliable. Local.
    </p>

    <a href="https://wa.me/YOUR_NUMBER?text=Hi! I saw your website and want to book a service." class="btn">
        SEND WHATSAPP MESSAGE
    </a>
</div>

<p style="font-size: 12px; color: #999; margin-top: 20px;">Powered by ShareWeb</p>
</head>
<body>
    <h1>Share Web Design for Tradie</h1>
</body>
</html>
